<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pixamle</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Pixamle</h1>

    <!-- We draw the animal here with JavaScript -->
    <canvas id="animalCanvas"></canvas>

    <form id="guessForm">
      <input
        id="guessInput"
        type="text"
        placeholder="Guess the animal"
        autocomplete="off"
      />

      <button type="submit">Guess</button>
    </form>

    <p id="message"></p>
    <p id="wrongGuesses"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
