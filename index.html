<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixamle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Pixamle</h1>

    <canvas id="animalCanvas"></canvas>

    <form id="guessForm">
      <input
        id="guessInput"
        type="text"
        placeholder="Guess the animal..."
        autocomplete="off"
      >

      <button type="submit">Guess</button>
    </form>

    <p id="message"></p>
    <p id="wrongGuesses"></p>

    <!-- DEV ONLY - DELETE OR COMMENT OUT BEFORE RELEASE -->
    <p id="devAnswer"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
