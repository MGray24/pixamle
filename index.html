<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixamle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="info-card">
      <h2>How to Play</h2>

      <p>Guess today's hidden animal.</p>
      <p>Each wrong guess makes the image clearer.</p>
      <p>Solve it before you run out of guesses.</p>

      <div class="progress-demo">
        <div class="demo-step">
            <canvas class="demo-canvas" data-resolution="6"></canvas>
            <p>Starts blocky</p>
        </div>

        <div class="demo-arrow">↓</div>

        <div class="demo-step">
            <canvas class="demo-canvas" data-resolution="16"></canvas>
            <p>Gets clearer</p>
        </div>

        <div class="demo-arrow">↓</div>

        <div class="demo-step">
            <canvas class="demo-canvas" data-resolution="64"></canvas>
            <p>Final reveal</p>
        </div>
        </div>
    </section>

    <section class="game-card">
      <h1>Pixamle</h1>

      <div class="canvas-frame">
        <canvas id="animalCanvas"></canvas>
      </div>

      <div id="playArea">
        <form id="guessForm">
          <input
            id="guessInput"
            type="text"
            placeholder="Guess an animal..."
            autocomplete="off"
          >

          <button type="submit">Guess</button>
        </form>

        <p id="message"></p>

        <div id="guessSlots" class="guess-slots"></div>
      </div>

      <div id="resultPanel" class="result-panel hidden">
        <h2 id="resultTitle"></h2>
        <p id="resultText"></p>
      </div>

      <!-- DEV ONLY - comment out before release -->
      <!-- <p id="devAnswer"></p> -->
    </section>

    <div class="right-spacer"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
